<script src="app.js"></script>

<script>
(function () {
  function mergeDetailTagsIntoOneLine() {
    const detailBox = document.getElementById("detailBox");
    if (!detailBox) return;

    const tagLine = Array.from(detailBox.children).find(function (el) {
      return el.classList && el.classList.contains("tag-line");
    });

    const tradeLine = Array.from(detailBox.children).find(function (el) {
      return el.classList && el.classList.contains("trade-line");
    });

    if (!tagLine || !tradeLine || tradeLine.dataset.mergedIntoTagLine === "true") return;

    Array.from(tradeLine.children).forEach(function (child) {
      tagLine.appendChild(child);
    });

    tradeLine.dataset.mergedIntoTagLine = "true";
    tradeLine.classList.add("detail-tags-merged-line");
    tradeLine.style.display = "none";
  }

  document.addEventListener("DOMContentLoaded", function () {
    mergeDetailTagsIntoOneLine();

    const detailBox = document.getElementById("detailBox");
    if (!detailBox) return;

    const observer = new MutationObserver(function () {
      window.requestAnimationFrame(mergeDetailTagsIntoOneLine);
    });

    observer.observe(detailBox, {
      childList: true,
      subtree: false
    });
  });
})();
</script>

<script>
(function () {
  function getTopLevelChild(detailBox, element) {
    let node = element;
    while (node && node.parentElement && node.parentElement !== detailBox) {
      node = node.parentElement;
    }
    return node && node.parentElement === detailBox ? node : null;
  }

  function isSectionTitleNode(node) {
    if (!node || node.nodeType !== 1) return false;
    const text = (node.textContent || "").trim();
    return (
      node.classList.contains("section-title-row") ||
      /^当前装备配色对比/.test(text) ||
      /^同模信息横向对比/.test(text) ||
      /^获取方式/.test(text)
    );
  }

  function findSectionStart(detailBox, titleText) {
    const candidates = Array.from(detailBox.querySelectorAll("h3, h4, summary, .section-title-row, .source-title, div"));
    const titleElement = candidates.find(function (el) {
      const text = (el.textContent || "").trim();
      return text.includes(titleText) && el !== detailBox;
    });

    return titleElement ? getTopLevelChild(detailBox, titleElement) : null;
  }

  function collectSection(detailBox, startNode) {
    if (!startNode) return [];

    const nodes = [startNode];
    let node = startNode.nextElementSibling;

    while (node) {
      if (node.classList.contains("source-box")) break;
      if (isSectionTitleNode(node)) break;

      nodes.push(node);
      node = node.nextElementSibling;
    }

    return nodes;
  }

  function moveNodesBefore(nodes, target) {
    if (!nodes.length || !target || !target.parentNode) return;

    const parent = target.parentNode;
    const fragment = document.createDocumentFragment();

    nodes.forEach(function (node) {
      fragment.appendChild(node);
    });

    parent.insertBefore(fragment, target);
  }

  function reorderDetailSections() {
    const detailBox = document.getElementById("detailBox");
    if (!detailBox) return;

    const currentStart = findSectionStart(detailBox, "当前装备配色对比");
    const sameModelStart = findSectionStart(detailBox, "同模信息横向对比");

    if (!currentStart || !sameModelStart || currentStart === sameModelStart) return;

    const children = Array.from(detailBox.children);
    const currentIndex = children.indexOf(currentStart);
    const sameModelIndex = children.indexOf(sameModelStart);

    if (currentIndex === -1 || sameModelIndex === -1) return;

    /*
      目标：整块互换顺序，不只动标题。
      如果“当前装备配色对比”在“同模信息横向对比”下面，就把它连标题和内容一起搬到同模信息前面。
    */
    if (currentIndex > sameModelIndex) {
      const currentSectionNodes = collectSection(detailBox, currentStart);
      moveNodesBefore(currentSectionNodes, sameModelStart);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    reorderDetailSections();

    const detailBox = document.getElementById("detailBox");
    if (!detailBox) return;

    const observer = new MutationObserver(function () {
      window.requestAnimationFrame(reorderDetailSections);
    });

    observer.observe(detailBox, {
      childList: true,
      subtree: true
    });
  });
})();
</script>

<script>
(function () {
  function getCurrentEngine() {
    const activeTab = document.querySelector(".engine-tab.active");
    return activeTab ? activeTab.dataset.engine : "gearPieces";
  }

  function setVisible(element, shouldShow) {
    if (!element) return;
    element.classList.toggle("hidden", !shouldShow);
  }

  function resetControl(element) {
    if (!element) return;

    if (element.type === "checkbox") {
      element.checked = false;
      return;
    }

    if ("value" in element) {
      element.value = "all";
    }
  }

  function syncSearchBarByEngine() {
    const currentEngine = getCurrentEngine();

    const isGearEngine =
      currentEngine === "gearPieces" ||
      currentEngine === "gearSets" ||
      currentEngine === "gearSeries";

    const isGearPiece = currentEngine === "gearPieces";
    const isWeaponPiece = currentEngine === "weaponPieces";
    const isWeaponEngine =
      currentEngine === "weaponPieces" ||
      currentEngine === "weaponSeries";

    const equipSlotFilter = document.getElementById("equipSlotFilter");
    const weaponTypeFilter = document.getElementById("weaponTypeFilter");
    const gearPieceCategoryFilterRow = document.getElementById("gearPieceCategoryFilterRow");

    const armorOnly = document.getElementById("armorOnly");
    const accessoryOnly = document.getElementById("accessoryOnly");

    /*
      五个引擎的基础搜索栏显示规则：
      - 装备散件：装备栏部位 + 只看防具/饰品
      - 装备套装：装备栏部位，不显示只看防具/饰品
      - 装备系列：装备栏部位，不显示只看防具/饰品
      - 武器散件：武器类型，不显示装备栏部位，不显示只看防具/饰品
      - 武器系列：不显示装备栏部位，不显示武器类型，不显示只看防具/饰品
    */

    setVisible(equipSlotFilter, isGearEngine);
    setVisible(weaponTypeFilter, isWeaponPiece);
    setVisible(gearPieceCategoryFilterRow, isGearPiece);

    if (!isGearEngine) {
      resetControl(equipSlotFilter);
    }

    if (!isWeaponPiece) {
      resetControl(weaponTypeFilter);
    }

    if (!isGearPiece) {
      resetControl(armorOnly);
      resetControl(accessoryOnly);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    syncSearchBarByEngine();

    document.querySelectorAll(".engine-tab").forEach(function (tab) {
      tab.addEventListener("click", function () {
        window.requestAnimationFrame(syncSearchBarByEngine);
        window.setTimeout(syncSearchBarByEngine, 0);
      });
    });
  });
})();
</script>
